<!-- Navbar Start -->
<nav class="navbar navbar-expand-lg fixed-top" [ngStyle]="navbar">
  <div class="sub-nav-container container-fluid p-3 d-flex justify-content-space-around align-items">
    <div class="logo-container">
		<a class="navbar-brand" [routerLink]="['/home']" routerLinkActive="home">
			<img src="../assets/images/logo/Netflix-Logo.png" alt="Logo" width="90" height="50" id="disktop-logo" class="d-inline-block align-text-top">
			<img src="../assets/images/logo/net_logo.png" alt="Logo" width="60" height="40" id="mobile-logo" class="d-inline-block align-text-top">
		</a>
	</div>
	
	<div class="">
		<!-- <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
		  <span class="navbar-toggler-icon"></span>
		</button> -->
		<div class="collapse navbar-collapse" id="navbarNavDropdown">
		  <ul class="navbar-nav">
			<li class="nav-item">
			  <a class="nav-link" href="#">Home</a>
			</li>
			<li class="nav-item">
			  <a class="nav-link" href="#">Movies</a>
			</li>
			<li class="nav-item">
			  <a class="nav-link" href="#">Series</a>
			</li>
			<li class="nav-item">
			  <a class="nav-link" href="#">Lists</a>
			</li>
		  </ul>
		</div>
	</div>
	<div class="auth-conatiner">
		<a class="sign-in" href="#">SignIn</a>
		<a class="sign-up" [routerLink]="['/auth/signup']" routerLinkActive="signup" >SignUp</a>
	</div>
  </div>
</nav>
