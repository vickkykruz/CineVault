<div class="container-fluid">
  <input
    type="checkbox"
    [(ngModel)]="checkBoxChecker"
    (ngModelChange)="handleCheckboxChange($event)"
    name=""
    id="sidebar-toggle"
  />
  <app-aside-bar [isChecked]="checkBoxChecker"></app-aside-bar>

  <!-- The Main Content -->
  <div class="main-content">
    <app-header></app-header>

    <!-- Main Body -->
    <main>
      <div class="page-header">
        <div class="">
          <h1>
            <span><i class="bx bx-envelope"></i></span> Inboxs
          </h1>
          <!-- <small>Last Login: March 08th, 2023 10:57pm</small> -->
        </div>
      </div>

      <div class="row mt-5">
        <div class="jobs">
          <div class="table_responsive">
            <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

              <!--- Note that these columns can be defined in any order.
                    The actual rendered columns are set as a property on the row definition" -->

              <ng-container matColumnDef="position">
                <th mat-header-cell *matHeaderCellDef> No. </th>
                <td mat-cell *matCellDef="let element"> {{element.position}} </td>
              </ng-container>

              <!-- Name Column -->
              <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef> Name </th>
                <td mat-cell *matCellDef="let element"> {{element.name}} </td>
              </ng-container>

              <!-- Email Column -->
              <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef> Email </th>
                <td mat-cell *matCellDef="let element"> {{element.email}} </td>
              </ng-container>



              <!-- Symbol Column -->
              <ng-container matColumnDef="symbol">
                <th mat-header-cell *matHeaderCellDef> Date </th>
                <td mat-cell *matCellDef="let element"> {{element.symbol}} </td>
              </ng-container>

              <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
              <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            </table>

          </div>
        </div>
      </div>
    </main>
  </div>
</div>
<!-- <label for="sidebar-toggle" class="body-label"></label> -->
<app-footer></app-footer>
